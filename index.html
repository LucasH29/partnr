.fi label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500;}

function chipGroup(id,items,sel,single){
  return '<div class="chip-group" id="'+id+'">'+

      var on=Array.isArray(sel)?sel.indexOf(item)>=0:sel===item;
      return '<div class="chip'+(on?' on':'')+'" onclick="chipClick(this,\''+id+'\','+(single?'true':'false')+')">'+item+'</div>';
    }).join('')+
  '</div>';
}

function updateSkillSummary(){
  var el=document.getElementById('skill-summary');if(!el)return;
  var sel=Object.keys(S.skillLevels).filter(function(k){return S.skillLevels[k]!==undefined;});
  var rated=sel.filter(function(k){return S.skillLevels[k];});
  var unrated=sel.filter(function(k){return !S.skillLevels[k];});
  if(!sel.length){el.textContent='No skills selected yet — tap any skill above to add it.';return;}
  var parts=[];
  if(rated.length)parts.push(rated.length+' skill'+(rated.length>1?'s':'')+' rated');
  if(unrated.length)parts.push(unrated.length+' still need a level');
  el.innerHTML=parts.join(' · ')+(unrated.length?' <span style="color:#854F0B;">← tap a level for each</span>':'<span style="color:#3B6D11;font-weight:500;"> ✓ All set</span>');
}

function onCompSearch(v){
  var dd=document.getElementById('cdd');if(!dd)return;
  if(!v||v.length<2){dd.style.display='none';return;}
  var q=v.toLowerCase();
  var res=ALL_COMPS.filter(function(c){return c.n.toLowerCase().includes(q)||c.cat.includes(q)||c.desc.toLowerCase().includes(q);}).slice(0,8);
  dd.innerHTML='';
  res.forEach(function(c){
    var cm=CATS_META[c.cat]||{c:'#7F77DD',bg:'#EEEDFE',tc:'#3C3489'};
    var div=document.createElement('div');div.className='cdo';
    div.innerHTML='<div style="flex:1;min-width:0;"><div class="cdo-name">'+c.n+'</div><div class="cdo-sub">'+c.team+' · '+c.eli+'</div></div>'+
      '<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:'+cm.bg+';color:'+cm.tc+';font-weight:500;flex-shrink:0;">'+cm.n+'</span>';
    div.addEventListener('click',function(){addComp(c);document.getElementById('ci').value='';dd.style.display='none';});
    dd.appendChild(div);
  });
  var exact=res.find(function(c){return c.n.toLowerCase()===q;});
  if(!exact){
    var addDiv=document.createElement('div');addDiv.className='cdo';
    addDiv.style.borderTop=res.length?'1px solid #f0f0ec':'none';
    addDiv.innerHTML='<div style="flex:1;min-width:0;"><div class="cdo-name" style="color:#7F77DD;">+ Add "'+v+'" as custom competition</div><div class="cdo-sub">Regional, state, or local competition</div></div>';
    addDiv.addEventListener('click',function(){
      addComp({n:v,cat:'custom',team:'Varies',eli:'Local / Regional',tier:3,desc:'Custom competition',why:'Find a partner for your specific competition'});
      document.getElementById('ci').value='';dd.style.display='none';
    });
    dd.appendChild(addDiv);
  }
  dd.style.display='block';
}

function renderCompCat(cat){
  var tabEl=document.querySelector('.ctab[data-cat="'+cat+'"]');
  if(cat==='all'){
    activeCats=[];
    document.querySelectorAll('.ctab').forEach(function(t){t.classList.remove('on');t.style.color='';});
    if(tabEl){tabEl.classList.add('on');tabEl.style.color='#7F77DD';}
  } else {
    var allTab=document.querySelector('.ctab[data-cat="all"]');
    if(allTab){allTab.classList.remove('on');allTab.style.color='';}
    if(tabEl){
      var isOn=tabEl.classList.contains('on');
      if(isOn){
        tabEl.classList.remove('on');tabEl.style.color='';
        activeCats=activeCats.filter(function(c){return c!==cat;});
      } else {
        var cm2=CATS_META[cat];
        tabEl.classList.add('on');tabEl.style.color=cm2?cm2.c:'#7F77DD';
        activeCats.push(cat);
      }
    }
    if(!activeCats.length){
      var allTab2=document.querySelector('.ctab[data-cat="all"]');
      if(allTab2){allTab2.classList.add('on');allTab2.style.color='#7F77DD';}
    }
  }
  activeCat=cat;
  var list=ALL_COMPS.filter(function(c){return activeCats.length===0||activeCats.indexOf(c.cat)>=0;});
  var el=document.getElementById('comp-list');if(!el)return;
  el.innerHTML='';
  list.forEach(function(c){
    var cm=CATS_META[c.cat]||{c:'#7F77DD',bg:'#EEEDFE',tc:'#3C3489'};
    var tm=TIER_COLORS[c.tier]||TIER_COLORS[2];
    var added=selComps.find(function(s){return s.n===c.n;});
    var div=document.createElement('div');div.className='cl-item';
    div.innerHTML='<div class="cl-left">'+
      '<div class="cl-name">'+c.n+'</div>'+
      '<div class="cl-desc">'+c.desc+'</div>'+
      '<div class="cl-meta">'+
        '<span class="cl-tag" style="background:'+cm.bg+';color:'+cm.tc+';">'+cm.n+'</span>'+
        '<span class="cl-tag" style="background:'+tm.bg+';color:'+tm.tc+';">'+TIER_LABELS[c.tier]+'</span>'+
        '<span class="cl-tag" style="background:#f4f4f0;color:#666;">'+c.team+'</span>'+
        '<span class="cl-tag" style="background:#f4f4f0;color:#666;">'+c.eli+'</span>'+
      '</div>'+
      '<div class="cl-why" style="color:'+cm.c+';"><i class="ti ti-users" style="font-size:11px;vertical-align:-1px;margin-right:3px;" aria-hidden="true"></i>'+c.why+'</div>'+
    '</div>'+
    '<button class="cl-add" style="background:'+(added?'#3B6D11':cm.c)+';">'+(added?'Added ✓':'+ Add')+'</button>';
    if(!added){
      div.querySelector('.cl-add').addEventListener('click',function(e){
        e.stopPropagation();addComp(c);
        this.textContent='Added ✓';this.style.background='#3B6D11';this.disabled=true;

async function doFetch(){
  var t=TR[S.track]||{},r=RO[S.role]||{};
  var prompt='You are Partnr\'s AI matching engine for global high school students finding project partners and co-founders.\n\nStudent: '+S.name+', '+S.school+', '+S.country+', '+S.grade+'\nLanguages: '+(S.languages.join(', ')||'English')+'\nTrack: '+t.n+', Role: '+r.n+', Status: '+S.status+'\nStage: '+(S.stage||'open')+'\nSkills: '+skStr()+'\nAvailability: '+S.availability+', Commitment: '+S.commit+'\nCompetitions: '+(S.comps.join(', ')||'open')+'\nIdea: '+(S.idea||'open')+'\nLocation: '+(S.location||'open')+'\n\nRULES: Match COMPLEMENTARY roles. Match skill LEVELS carefully. At least 1 match from a different continent.\n\nGenerate 3 student matches. Each:\nname, school, country, grade, avatar(2 initials), avatarColor(purple/teal/coral/blue/green), track, role(vision/tech_r/mktg/ops/res_r/creative), skillsWithLevels(object e.g.{"Python":"Advanced"}), competitions(array 2-3), matchScore(85-98), why(2 specific sentences on role+skill complementarity), projectIdea(1 sentence), commitment, availability, timezone, isNearby(bool), languages(array), status, stage(spark/planning/building/submitting/open), bio(2 sentences), experience(array of 3:{title,desc}), awards(array 0-2 strings), portfolio(realistic URL or null), lookingFor(2 sentences)\n\nGenerate 3 projects recruiting role "'+r.n+'". Each: title, description, neededRole, skills(2-3), competition, spots(1-2), authorName, authorSchool, authorCountry, track, posted, matchReason, stage\n\nGenerate 5 competitions for track '+t.n+'. Each: name, track, description, deadline(e.g."Feb 1 2026"), daysUntil(30-300 integer), prize, teamSize, isRecommended(bool), eligibility\n\nReturn ONLY valid JSON: {"matches":[...],"projects":[...],"competitions":[...]}';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2500,messages:[{role:'user',content:prompt}]})});
    var d=await res.json();
    var parsed=JSON.parse(d.content.map(function(b){return b.text||'';}).join('').replace(/```json|```/g,'').trim());
    MATCHES=parsed.matches||[];PROJECTS=parsed.projects||[];COMPS_DATA=parsed.competitions||[];
    goTo('matches');
  }catch(e){fallback();}
}

async function srchSkill(skill){
  var el=document.getElementById('sr');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:1.5rem;"><div class="spin" style="margin:0 auto 0.5rem;"></div><div style="font-size:13px;color:#888;">Finding students with '+esc(skill)+'...</div></div>';
  var p='Generate 4 fictional high school students globally with "'+skill+'" expertise. Diverse countries. Each: name,school,country,grade,avatar(2 initials),avatarColor(purple/teal/coral/blue/green),track,role(vision/tech_r/mktg/ops/res_r/creative),availability,status(has project|open to joining|has idea|exploring),bio(1-2 sentences),keySkill,keyLevel(Beginner/Intermediate/Advanced/Expert),otherSkills(array 2-3),competitions(1-2),portfolio(URL or null). Return ONLY valid JSON: {"results":[...]}';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,messages:[{role:'user',content:p}]})});
    var d=await res.json();
    var parsed=JSON.parse(d.content.map(function(b){return b.text||'';}).join('').replace(/```json|```/g,'').trim());
    var sbgs={'has project':'#EEEDFE','open to joining':'#EAF3DE','has idea':'#FAEEDA','exploring':'#F1EFE8'};
    var stcs={'has project':'#3C3489','open to joining':'#3B6D11','has idea':'#854F0B','exploring':'#5F5E5A'};
    var h='<div style="font-size:13px;color:#888;margin-bottom:10px;"><strong style="color:#1a1a1a;">'+(parsed.results||[]).length+'</strong> students found with '+esc(skill)+'</div>';
    (parsed.results||[]).forEach(function(r){
      var cm2=CM[r.avatarColor]||CM.purple;var t2=TR[r.track]||TR.research;var ro=RO[r.role]||{n:r.role,i:'ti-user'};
      var sk=Object.keys(sbgs).find(function(k){return r.status&&r.status.toLowerCase().includes(k);})||'exploring';
      var others=(r.otherSkills||[]).map(function(s){return '<span class="tag">'+s+'</span>';}).join('');
      h+='<div class="card" style="display:flex;gap:12px;align-items:flex-start;">'+
        '<div class="av" style="width:42px;height:42px;font-size:13px;background:'+cm2.bg+';color:'+cm2.c+';flex-shrink:0;">'+r.avatar+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px;"><span style="font-size:14px;font-weight:600;color:#1a1a1a;">'+r.name+'</span><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+(sbgs[sk]||'#F1EFE8')+';color:'+(stcs[sk]||'#666')+';font-weight:500;">'+r.status+'</span></div>'+
          '<div style="font-size:12px;color:#888;margin-bottom:4px;">'+r.school+' · '+r.country+' · '+r.grade+'</div>'+
          '<div style="font-size:12px;color:#666;margin-bottom:6px;line-height:1.4;">'+r.bio+'</div>'+
          '<div class="tags" style="margin-bottom:6px;"><span class="tag" style="background:'+(LBGS[r.keyLevel]||'#EEEDFE')+';color:'+(LTCS[r.keyLevel]||'#3C3489')+';font-weight:600;">'+r.keySkill+' · '+r.keyLevel+'</span>'+others+'<span class="tag" style="background:#EEEDFE;color:#534AB7;"><i class="ti '+ro.i+'" style="font-size:11px;vertical-align:-1px;margin-right:2px;" aria-hidden="true"></i>'+ro.n+'</span></div>'+
          '<div style="display:flex;gap:6px;"><button class="bc" style="background:'+t2.c+';padding:6px 12px;font-size:12px;" onclick="alert(\'Connect flow — write your intro message.\')">Connect →</button>'+
          (r.portfolio?'<a href="https://'+r.portfolio+'" style="font-size:12px;color:'+t2.c+';text-decoration:none;display:flex;align-items:center;gap:3px;padding:6px 0;" target="_blank"><i class="ti ti-external-link" style="font-size:12px;" aria-hidden="true"></i>Portfolio</a>':'')+
          '</div>'+
        '</div></div>';
    });
    el.innerHTML=h;
  }catch(e){if(el)el.innerHTML='<div style="padding:1.5rem;text-align:center;color:#888;">Search failed — try again.</div>';}
}
