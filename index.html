function mkChips(containerId, items, selected, single) {
  var div = document.getElementById(containerId);
  if (!div) return;
  div.innerHTML = "";
  items.forEach(function(item) {
    var c = document.createElement("div");
    c.className = "chip";
    c.textContent = item;
    var isOn = Array.isArray(selected) ? selected.indexOf(item) >= 0 : selected === item;
    if (isOn) c.classList.add("on");
    c.addEventListener("click", function() {
      if (single) div.querySelectorAll(".chip").forEach(function(x){x.classList.remove("on");});
      c.classList.toggle("on");
    });
    div.appendChild(c);
  });
}

function getChips(containerId) {
  return Array.from(document.querySelectorAll("#" + containerId + " .chip.on")).map(function(c){return c.textContent;});
}

        this.classList.add("on");
        S.skillLevels[sk] = null;
        this.querySelector(".scc").innerHTML = "<i class=\"ti ti-check\" style=\"font-size:11px;color:white;\"></i>";
      }
      updSS();
    });
    chip.querySelectorAll(".lv").forEach(function(lv){

        e.stopPropagation();
        var sk = chip.dataset.skill;
        chip.querySelectorAll(".lv").forEach(function(x){x.classList.remove("on");});

function doSearch(v){
  var dd=document.getElementById("cdd"); if(!dd) return;
  if(!v||v.length<1){dd.style.display="none";return;}
  var q=v.toLowerCase();
  var res=COMPS.filter(function(c){return c.n.toLowerCase().indexOf(q)>=0||c.cat.indexOf(q)>=0||c.desc.toLowerCase().indexOf(q)>=0;}).slice(0,8);
  dd.innerHTML="";
  res.forEach(function(c){
    var cm=CM2[c.cat]||{c:"#7F77DD",bg:"#EEEDFE",tc:"#3C3489"};
    var d=document.createElement("div"); d.className="cddo";
    d.innerHTML="<div style=\"flex:1;min-width:0;\"><div style=\"font-size:13px;font-weight:500;\">"+c.n+"</div><div style=\"font-size:11px;color:#888;margin-top:1px;\">"+c.team+" \u00b7 "+c.eli+"</div></div>"+
      "<span style=\"font-size:10px;padding:2px 8px;border-radius:20px;background:"+cm.bg+";color:"+cm.tc+";font-weight:500;flex-shrink:0;\">"+cm.n+"</span>";
    d.addEventListener("click",function(){addComp(c);document.getElementById("ci").value="";dd.style.display="none";});
    dd.appendChild(d);
  });
  if(v.trim().length>2){
    var cv=v.trim();
    var already=COMPS.some(function(c){return c.n.toLowerCase()===cv.toLowerCase();});
    if(!already){
      var cd=document.createElement("div"); cd.className="cddo";
      if(res.length) cd.style.borderTop="2px solid #f0f0ec";
      cd.innerHTML="<div><div style=\"font-size:13px;font-weight:600;color:#7F77DD;\">+ Add \""+esc(cv)+"\" as custom competition</div><div style=\"font-size:11px;color:#888;margin-top:1px;\">Regional, state, local, or any other competition</div></div>";
      cd.addEventListener("click",function(){addComp({n:cv,cat:"custom",team:"Varies",eli:"Local / Regional",tier:3,desc:"Custom competition",why:"Find a partner for your specific competition"});document.getElementById("ci").value="";dd.style.display="none";});
      dd.appendChild(cd);
    }
  }
  dd.style.display=(res.length||v.trim().length>2)?"block":"none";
}

function renderCat(){

async function doFetch(){
  var t=TR[S.track]||{n:S.track}; var r=RO[S.role]||{n:S.role};
  var prompt="You are Partnr AI matching engine for global high school students.\n\nStudent: "+S.name+", "+S.school+", "+S.country+", "+S.grade+"\nLanguages: "+(S.languages.join(", ")||"English")+"\nTrack: "+t.n+", Role: "+r.n+", Status: "+S.status+"\nStage: "+(S.stage||"open")+"\nSkills: "+skStr()+"\nAvailability: "+S.availability+", Commitment: "+S.commit+"\nCompetitions: "+(S.comps.join(", ")||"open")+"\nIdea: "+(S.idea||"open")+"\nLocation: "+(S.location||"open")+"\n\nRULES: Match COMPLEMENTARY roles. Match skill LEVELS carefully. At least 1 from different continent.\n\nGenerate 3 student matches. Each: name,school,country,grade,avatar(2 initials),avatarColor(purple/teal/coral/blue/green),track,role(vision/tech_r/mktg/ops/res_r/creative),skillsWithLevels(object),competitions(array 2-3),matchScore(85-98),why(2 sentences),projectIdea,commitment,availability,timezone,isNearby(bool),languages(array),status,stage,bio(2 sentences),experience(array 3:{title,desc}),awards(array 0-2),portfolio(URL or null),lookingFor(2 sentences)\n\nGenerate 3 projects recruiting role \""+r.n+"\". Each: title,description,neededRole,skills(2-3),competition,spots(1-2),authorName,authorSchool,authorCountry,track,posted,matchReason,stage\n\nGenerate 5 competitions for track "+t.n+". Each: name,track,description,deadline,daysUntil(integer 30-300),prize,teamSize,isRecommended(bool),eligibility\n\nReturn ONLY valid JSON: {\"matches\":[...],\"projects\":[...],\"competitions\":[...]}";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,messages:[{role:"user",content:prompt}]})});
    if(!res.ok) throw new Error("status "+res.status);
    var d=await res.json();
    if(d.error) throw new Error("api error");
    var txt=d.content.map(function(b){return b.text||"";}).join("").replace(/```json|```/g,"").trim();
    var parsed=JSON.parse(txt);
    MATCHES=parsed.matches||[]; PROJECTS=parsed.projects||[]; COMPS_DATA=parsed.competitions||[];
    goTo("matches");
  } catch(e){ fallback(); }
}
