function getAllSelectedLangs(){
  var a=Array.from(document.querySelectorAll("#lang-primary .chip.on")).map(function(c){return c.textContent;});

  return a.concat(b);
}
function renderLangSections(country,selected){
  selected=selected||[];

  var other=LANGS.filter(function(l){return primary.indexOf(l)<0&&l!=="English";});
  var sDiv=document.getElementById("lang-suggested");

var SAVE_KEY="partnr_state_v1";
var PAGE_KEY="partnr_page_v1";
var MATCHES_KEY="partnr_matches_v1";

function saveState(page){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(S));
    localStorage.setItem(PAGE_KEY,page||"welcome");
    if(MATCHES.length) localStorage.setItem(MATCHES_KEY,JSON.stringify({matches:MATCHES,projects:PROJECTS,comps:COMPS_DATA,conns:CONNS,selComps:selComps}));
  } catch(e){}
}

function loadState(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(raw){
      var parsed=JSON.parse(raw);
      Object.keys(parsed).forEach(function(k){S[k]=parsed[k];});
    }
    var mraw=localStorage.getItem(MATCHES_KEY);
    if(mraw){
      var md=JSON.parse(mraw);
      MATCHES=md.matches||[];PROJECTS=md.projects||[];COMPS_DATA=md.comps||[];CONNS=md.conns||[];selComps=md.selComps||[];
    }
    return localStorage.getItem(PAGE_KEY)||"welcome";
  } catch(e){return "welcome";}
}

function clearSave(){
  try{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(PAGE_KEY);localStorage.removeItem(MATCHES_KEY);}catch(e){}
}

function goTo(p){
  window.scrollTo(0,0);
  saveState(p);
  if(p==="welcome")rWelcome();
  else if(p==="signup")rSignup();
  else if(p==="track")rTrack();
  else if(p==="skills")rSkills();
  else if(p==="goals")rGoals();
  else if(p==="loading")rLoading();
  else if(p==="matches")rMatches();
}

function showErr(id,msg){
  var el=document.getElementById(id);
  if(!el) return;
  el.classList.add("err");
  // Remove existing error message if any
  var existing=el.parentNode.querySelector(".field-err");
  if(existing) existing.remove();
  var err=document.createElement("div");
  err.className="field-err";
  err.innerHTML='<i class="ti ti-alert-circle"></i>'+msg;
  el.parentNode.appendChild(err);
  el.addEventListener("input",function(){clearErr(id);},{once:true});
  el.addEventListener("change",function(){clearErr(id);},{once:true});
}
function clearErr(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.classList.remove("err");
  var existing=el.parentNode.querySelector(".field-err");
  if(existing) existing.remove();
}
function showSecErr(id,msg){
  var existing=document.getElementById("sec-err-"+id);
  if(existing) existing.remove();
  var div=document.createElement("div");
  div.className="sec-err";div.id="sec-err-"+id;
  div.innerHTML='<i class="ti ti-alert-circle" style="font-size:14px;flex-shrink:0;"></i>'+msg;
  var target=document.getElementById(id);
  if(target) target.parentNode.insertBefore(div,target);
}
function scrollToFirstErr(){
  var first=document.querySelector(".err,.sec-err");
  if(first) first.scrollIntoView({behavior:"smooth",block:"center"});
}

function mkChips(id,items,sel,single){
  var div=document.getElementById(id);
  if(!div) return;
  div.innerHTML="";
  items.forEach(function(item){
    var c=document.createElement("div");
    c.className="chip";
    c.textContent=item;
    var isOn=Array.isArray(sel)?sel.indexOf(item)>=0:sel===item;
    if(isOn) c.classList.add("on");
    c.addEventListener("click",function(){
      if(single) div.querySelectorAll(".chip").forEach(function(x){x.classList.remove("on");});
      c.classList.toggle("on");
    });
    div.appendChild(c);
  });
}
function getChips(id){
  return Array.from(document.querySelectorAll("#"+id+" .chip.on")).map(function(c){return c.textContent;});
}

function rSkills(){

            "<i class=\"ti "+cat.icon+"\" style=\"font-size:16px;color:"+cat.color+";\"></i>"+
          "</div>"+
          "<div>"+
            "<div style=\"font-size:14px;font-weight:600;color:#1a1a1a;\">"+cat.label+"</div>"+

          "</div>"+
        "</div>"+

          (sel.length?"<span style=\"font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:"+cat.bg+";color:"+cat.tc+"\">"+sel.length+" selected</span>":"")+

        "</div>"+

        "<div class=\"skill-items-grid\">"+itemsHtml+"</div>"+

  R(logo()+sb(3)+

    "<div id=\"ssum\" style=\"font-size:13px;color:#888;margin:1rem 0;\"></div>"+

    "<div style=\"display:flex;gap:8px;margin-bottom:1rem;\">"+
      "<input id=\"customskill\" placeholder=\"e.g. VHDL, Competitive Chess, Mandarin Calligraphy...\" style=\"flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a1a;background:white;\"/>"+
      "<button id=\"addskillbtn\" style=\"padding:10px 14px;background:#EEEDFE;color:#534AB7;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;\">Add</button>"+
    "</div>"+
    "<div id=\"custom-skills-row\" style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;\"></div>"+
    "<div class=\"slabel\">Weekly availability</div>"+

    "<div class=\"slabel\">Portfolio / GitHub (optional)</div>"+
    "<div class=\"fi\"><input id=\"igh\" placeholder=\"github.com/yourname or portfolio URL\" value=\""+esc(S.github)+"\"/></div>"+
    "<button class=\"bp\" id=\"s4\">Continue \u2192</button>"+
    "<button class=\"bkbtn\" id=\"bk\">\u2190 Back</button>"
  );

  mkChips("avail",["1-3 hrs/week","4-8 hrs/week","10+ hrs/week","Weekends only"],[S.availability],true);

  document.querySelectorAll(".skill-cat-header").forEach(function(hdr){

      var body=document.getElementById("body-"+cid);
      var chev=document.getElementById("chev-"+cid);

      chev.style.fontSize="16px";chev.style.color="#888";

  });

  // Bind skill items
  document.querySelectorAll(".skill-item").forEach(function(item){
    item.addEventListener("click",function(e){
      if(e.target.classList.contains("lv")) return;
      var key=this.dataset.key;
      var type=this.dataset.type;
      var on=this.classList.contains("on");
      var chk=this.querySelector(".skill-item-check");
      var lvRow=this.querySelector(".lv-inline");
      if(on){
        this.classList.remove("on");
        delete S.skillLevels[key];
        chk.classList.remove("on");chk.innerHTML="";
        if(lvRow)lvRow.classList.remove("show");

        this.classList.add("on");

    var key="custom:"+val;
    if(S.skillLevels[key]!==undefined){inp.value="";return;}
    S.skillLevels[key]="noted";
    var row=document.getElementById("custom-skills-row");
    var pill=document.createElement("span");
    pill.style.cssText="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:#EEEDFE;color:#3C3489;";
    pill.textContent=val+" ";
    var x=document.createElement("button");
    x.textContent="\u00d7";x.style.cssText="background:none;border:none;cursor:pointer;font-size:14px;padding:0;opacity:0.6;line-height:1;";
    x.addEventListener("click",function(){delete S.skillLevels[key];row.removeChild(pill);updSS();});
    pill.appendChild(x);row.appendChild(pill);
    inp.value="";updSS();
  });
  document.getElementById("customskill").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("addskillbtn").click();}});
  document.getElementById("s4").addEventListener("click",step4);
  document.getElementById("bk").addEventListener("click",function(){goTo("track");});
  updSS();
}

function updSS(){
  var el=document.getElementById("ssum");if(!el) return;
  var all=Object.keys(S.skillLevels);
  var total=all.length;
  var needLv=all.filter(function(k){
    var cat=SKILL_CATS.find(function(c){return k.indexOf(c.id+":")===0;});
    return cat&&cat.type==="level"&&!S.skillLevels[k];
  });
  if(!total){el.textContent="No skills selected yet \u2014 open a category above to add skills.";return;}
  el.innerHTML=total+" skill"+(total>1?"s":"")+" selected"+
    (needLv.length?" \u00b7 <span style=\"color:#854F0B;\">"+needLv.length+" still need a level \u2190</span>":
    " <span style=\"color:#3B6D11;font-weight:600;\">\u2713 All set</span>");
}

function skStr(){
  return Object.keys(S.skillLevels).filter(function(k){return S.skillLevels[k];}).map(function(k){
    var parts=k.split(":");
    var skill=parts.length>1?parts[1]:k;
    var lv=S.skillLevels[k];
    if(lv==="studied"||lv==="noted") return skill;
    return skill+" ("+lv+")";
  }).join(", ");
}

function doSearch(v){
  var dd=document.getElementById("cdd");if(!dd) return;
  if(!v||v.length<1){dd.style.display="none";return;}
  var q=v.toLowerCase();
  var res=COMPS.filter(function(c){return c.n.toLowerCase().indexOf(q)>=0||c.cat.indexOf(q)>=0||c.desc.toLowerCase().indexOf(q)>=0;}).slice(0,8);
  dd.innerHTML="";
  res.forEach(function(c){
    var cm=CM2[c.cat]||{c:"#7F77DD",bg:"#EEEDFE",tc:"#3C3489"};
    var xt=c.cross===true?"\u2705 Cross-school":c.cross==="prep"?"\u{1F4DD} Prep partner":"\u{1F3EB} Same school";
    var d=document.createElement("div");d.className="cddo";
    d.innerHTML="<div style=\"flex:1;min-width:0;\"><div style=\"font-size:13px;font-weight:500;\">"+c.n+"</div><div style=\"font-size:11px;color:#888;margin-top:1px;\">"+xt+" \u00b7 "+c.eli+"</div></div>"+
      "<span style=\"font-size:10px;padding:2px 8px;border-radius:20px;background:"+cm.bg+";color:"+cm.tc+";font-weight:500;flex-shrink:0;\">"+cm.n+"</span>";
    d.addEventListener("click",function(){addComp(c);document.getElementById("ci").value="";dd.style.display="none";});
    dd.appendChild(d);
  });
  if(v.trim().length>2){
    var cv=v.trim();
    if(!COMPS.some(function(c){return c.n.toLowerCase()===cv.toLowerCase();})){
      var cd=document.createElement("div");cd.className="cddo";
      if(res.length)cd.style.borderTop="2px solid #f0f0ec";
      cd.innerHTML="<div><div style=\"font-size:13px;font-weight:600;color:#7F77DD;\">+ Add \""+esc(cv)+"\" as custom competition</div><div style=\"font-size:11px;color:#888;margin-top:1px;\">Regional, state, local, or any other competition</div></div>";
      cd.addEventListener("click",function(){addComp({n:cv,cat:"custom",team:"Varies",eli:"Local / Regional",tier:3,cross:true,desc:"Custom competition",why:"Find a partner for your specific competition"});document.getElementById("ci").value="";dd.style.display="none";});
      dd.appendChild(cd);
    }
  }
  dd.style.display=(res.length||v.trim().length>2)?"block":"none";
}

    var cm=CM2[c.cat]||{c:"#7F77DD",bg:"#EEEDFE",tc:"#3C3489"};

    var added=selComps.some(function(s){return s.n===c.n;});
    var xbg=c.cross===true?"#EAF3DE":c.cross==="prep"?"#EEEDFE":"#FFF3E0";
    var xtc=c.cross===true?"#3B6D11":c.cross==="prep"?"#534AB7":"#854F0B";
    var xicon=c.cross===true?"ti-world":c.cross==="prep"?"ti-user":"ti-school";

      "<div style=\"display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;\">"+
        "<span style=\"font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;background:"+cm.bg+";color:"+cm.tc+";\">"+cm.n+"</span>"+
        "<span style=\"font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;background:"+tm.bg+";color:"+tm.tc+";\">"+tm.lbl+"</span>"+
        "<span style=\"font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;background:"+xbg+";color:"+xtc+";\"><i class=\"ti "+xicon+"\" style=\"font-size:10px;vertical-align:-1px;margin-right:2px;\"></i>"+xlabel+"</span>"+
        "<span style=\"font-size:10px;padding:2px 7px;border-radius:20px;background:#f4f4f0;color:#666;\">"+c.eli+"</span>"+
      "</div>"+
      "<div style=\"font-size:11px;font-style:italic;color:"+cm.c+";margin-top:4px;\"><i class=\"ti ti-users\" style=\"font-size:11px;vertical-align:-1px;margin-right:3px;\"></i>"+c.why+"</div>"+
    "</div>"+
    "<button style=\"flex-shrink:0;padding:6px 12px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:white;margin-top:2px;font-family:inherit;background:"+(added?"#3B6D11":cm.c)+";\">"+
      (added?"Added \u2713":"+ Add")+
    "</button>";
    if(!added){
      d.querySelector("button").addEventListener("click",function(e){
        e.stopPropagation();addComp(c);
        this.textContent="Added \u2713";this.style.background="#3B6D11";this.disabled=true;
      });
    } else {d.querySelector("button").disabled=true;}
    el.appendChild(d);
  });
}

function addComp(c){if(selComps.some(function(s){return s.n===c.n;}))return;selComps.push(c);renderPills();if(exploreOpen)renderCat();}
function removeComp(name){selComps=selComps.filter(function(c){return c.n!==name;});renderPills();if(exploreOpen)renderCat();}
function renderPills(){
  var el=document.getElementById("pills");if(!el) return;
  el.innerHTML="";
  if(!selComps.length){
    var msg=document.createElement("span");
    msg.style.cssText="font-size:13px;color:#aaa;font-style:italic;";
    msg.textContent="None yet \u2014 search above or browse by category";
    el.appendChild(msg);return;
  }
  selComps.forEach(function(c){
    var cm=CM2[c.cat]||{bg:"#EEEDFE",tc:"#3C3489"};
    var sp=document.createElement("span");
    sp.className="pill";sp.style.background=cm.bg;sp.style.color=cm.tc;
    var txt=document.createTextNode(c.n+" ");
    var btn=document.createElement("button");btn.textContent="\u00d7";
    var name=c.n;
    btn.addEventListener("click",function(){removeComp(name);});
    sp.appendChild(txt);sp.appendChild(btn);el.appendChild(sp);

async function doFetch(){
  var t=TR[S.track]||{n:S.track};var r=RO[S.role]||{n:S.role};
  var compInfo=selComps.map(function(c){
    var crossNote=c.cross===true?"(cross-school ok)":c.cross==="prep"?"(prep partner only)":"(same school required)";
    return c.n+" "+crossNote;
  }).join(", ")||"open";
  var prompt="You are Partnr AI matching engine for global high school students.\n\nStudent: "+S.name+", "+S.school+", "+S.country+", "+S.grade+"\nLanguages: "+(S.languages.join(", ")||"English")+"\nTrack: "+t.n+", Role: "+r.n+", Status: "+S.status+"\nStage: "+(S.stage||"open")+"\nSkills: "+skStr()+"\nAvailability: "+S.availability+", Commitment: "+S.commit+"\nCompetitions: "+compInfo+"\nIdea: "+(S.idea||"open")+"\nLocation: "+(S.location||"open")+"\n\nIMPORTANT MATCHING RULES:\n- Match COMPLEMENTARY roles (CEO gets CTO, researcher gets engineer)\n- Match skill LEVELS carefully\n- For cross-school competitions: match globally\n- For same-school competitions: prioritize same city/region\n- For prep-partner competitions: match globally by intellectual interest\n- At least 1 match from a different continent\n\nGenerate 3 student matches. Each: name,school,country,grade,avatar(2 initials),avatarColor(purple/teal/coral/blue/green),track,role(vision/tech_r/mktg/ops/res_r/creative),skillsWithLevels(object),competitions(array 2-3),matchScore(85-98),why(2 specific sentences on role+skill complementarity),projectIdea,commitment,availability,timezone,isNearby(bool),languages(array),status,stage,bio(2 sentences),experience(array 3:{title,desc}),awards(array 0-2),portfolio(URL or null),lookingFor(2 sentences)\n\nGenerate 3 projects recruiting role \""+r.n+"\". Each: title,description,neededRole,skills(2-3),competition,spots(1-2),authorName,authorSchool,authorCountry,track,posted,matchReason,stage\n\nGenerate 5 competitions for track "+t.n+". Each: name,track,description,deadline,daysUntil(integer 30-300),prize,teamSize,isRecommended(bool),eligibility\n\nReturn ONLY valid JSON: {\"matches\":[...],\"projects\":[...],\"competitions\":[...]}";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,messages:[{role:"user",content:prompt}]})});
    if(!res.ok) throw new Error("status "+res.status);
    var d=await res.json();
    if(d.error) throw new Error("api error");
    var txt=d.content.map(function(b){return b.text||"";}).join("").replace(/```json|```/g,"").trim();
    var parsed=JSON.parse(txt);
    MATCHES=parsed.matches||[];PROJECTS=parsed.projects||[];COMPS_DATA=parsed.competitions||[];
    goTo("matches");
  } catch(e){fallback();}
}
